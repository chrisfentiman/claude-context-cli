name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: claude-context-cli-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: claude-context-cli-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: claude-context-cli-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: claude-context-cli-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binary
        run: bun build cli.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum claude-context-cli-* > checksums.txt
          cat checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          chmod +x artifacts/claude-context-cli-*
          gh release create ${{ github.ref_name }} \
            --title "claude-context-cli ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/claude-context-cli-* \
            artifacts/checksums.txt
