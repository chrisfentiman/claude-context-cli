name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: claude-context-cli-darwin-arm64
          - os: macos-15-intel
            artifact: claude-context-cli-darwin-x64
          - os: ubuntu-latest
            artifact: claude-context-cli-linux-x64
          - os: ubuntu-24.04-arm
            artifact: claude-context-cli-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm install

      - name: Build SEA binary
        run: bash scripts/build-sea.sh ${{ matrix.artifact }}

      - name: Verify binary runs
        run: ./dist/${{ matrix.artifact }} --help
