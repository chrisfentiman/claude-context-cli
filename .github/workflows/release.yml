name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.CLAUDE_CONTEXT_CLI_RELEASE_TOKEN }}

      - name: Enable auto-merge
        if: steps.release.outputs.pr
        run: gh pr merge --squash --auto ${{ fromJSON(steps.release.outputs.pr).number }}
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_CONTEXT_CLI_RELEASE_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build:
    name: Build (${{ matrix.artifact }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: claude-context-cli-darwin-arm64
          - os: macos-15-intel
            artifact: claude-context-cli-darwin-x64
          - os: ubuntu-latest
            artifact: claude-context-cli-linux-x64
          - os: ubuntu-24.04-arm
            artifact: claude-context-cli-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm install

      - name: Build SEA binary
        run: bash scripts/build-sea.sh ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    name: Upload binaries
    needs: [release-please, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum claude-context-cli-* > checksums.txt
          cat checksums.txt

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          chmod +x artifacts/claude-context-cli-*
          gh release upload ${{ needs.release-please.outputs.tag_name }} artifacts/claude-context-cli-* artifacts/checksums.txt --clobber
